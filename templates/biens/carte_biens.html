<!-- Page de démo : le locataire consulte les biens disponibles sur la carte -->
<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <title>Biens disponibles - LogCiv</title>
  <style>
    html, body { height: 100%; margin: 0; }
    #map { height: 100%; width: 100%; }
  </style>
</head>
<body>
  <div id="map"></div>

  <script>
    let map;

    async function initMap() {
      map = new google.maps.Map(document.getElementById("map"), {
        zoom: 12,
        center: { lat: 5.3599, lng: -4.0083 }, // Abidjan, à adapter
      });

      const response = await fetch("/api/biens/?statut=disponible");
      const data = await response.json();
      const biens = Array.isArray(data) ? data : data.results || [];

      biens.forEach((bien) => {
        if (!bien.latitude || !bien.longitude) return;

        const position = {
          lat: parseFloat(bien.latitude),
          lng: parseFloat(bien.longitude),
        };

        const marker = new google.maps.Marker({
          position,
          map,
          title: bien.titre,
        });

        const infoWindow = new google.maps.InfoWindow({
          content: `
            <strong>${bien.titre}</strong><br>
            ${bien.ville}${bien.localisation ? " - " + bien.localisation : ""}<br>
            ${bien.prix} FCFA
          `,
        });

        marker.addListener("click", () => infoWindow.open(map, marker));
      });
    }
  </script>

  <script async src="https://maps.googleapis.com/maps/api/js?key={{ google_maps_api_key }}&callback=initMap"></script>
</body>
</html>
